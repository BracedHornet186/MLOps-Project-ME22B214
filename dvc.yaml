# dvc.yaml
# Inference-only 3D scene reconstruction pipeline

stages:
  validate:
    cmd: python scripts/validate_data.py
    deps:
      - scripts/validate_data.py
      - scripts/data.py
      - scripts/data_schema.py
      - data/train_labels.csv
      - data/train_thresholds.csv
      - data/train
    outs:
      - data/baselines/validation_report.json
    metrics:
      - data/baselines/validation_metrics.json

  eda_baselines:
    cmd: python scripts/eda_baselines.py
    deps:
      - scripts/eda_baselines.py
      - scripts/data.py
      - scripts/data_schema.py
      - data/train_labels.csv
      - data/train
      - data/baselines/validation_report.json
    metrics:
      - data/baselines/eda_baselines.json
      - data/baselines/eda_metrics.json

  image_preprocess:
    cmd: python scripts/image_processing.py --preprocess-conf conf/preprocess.yaml
    deps:
      - scripts/image_processing.py
      - scripts/data.py
      - scripts/data_schema.py
      - pipelines/scene.py
      - preprocesses/pipeline.py
      - preprocesses/orientation.py
      - preprocesses/deblur.py
      - conf/preprocess.yaml
      - data/train_labels.csv
      - data/train
    outs:
      - data/processed/images
      - data/processed/preprocess_report.json
    metrics:
      - data/processed/preprocess_metrics.json
    params:
      - conf/preprocess.yaml:
          - deblurring.blurry_threshold
          # - orientation.type

  extract_features:
    cmd: python scripts/extract_features.py --config conf/mast3r.yaml
    deps:
      - conf/mast3r.yaml
      - scripts/extract_features.py
      - data/baselines/validation_report.json
      - data/processed/images
      - data/processed/preprocess_report.json
      - data/train
    outs:
      - data/features
      - data/extracted

  retrieval:
    cmd: python scripts/retrieval.py --config conf/mast3r.yaml
    deps:
      - conf/mast3r.yaml
      - scripts/retrieval.py
      - data/features
    outs:
      - data/retrieval

  generate_pairs:
    cmd: python scripts/generate_pairs.py --config conf/mast3r.yaml
    deps:
      - conf/mast3r.yaml
      - scripts/generate_pairs.py
      - data/retrieval
    outs:
      - data/pairs

  detect_keypoints:
    cmd: python scripts/detect_keypoints.py --config conf/mast3r.yaml
    deps:
      - conf/mast3r.yaml
      - scripts/detect_keypoints.py
      - data/extracted
      - data/pairs
    outs:
      - data/keypoints

  match:
    cmd: python scripts/match.py --config conf/mast3r.yaml
    deps:
      - conf/mast3r.yaml
      - scripts/match.py
      - data/pairs
      - data/keypoints
    outs:
      - data/matches

  reconstruct:
    cmd: python scripts/reconstruct.py --config conf/mast3r.yaml
    deps:
      - conf/mast3r.yaml
      - scripts/reconstruct.py
      - data/matches
    outs:
      - data/reconstruction

  evaluate:
    cmd: python scripts/evaluate.py --config conf/mast3r.yaml
    deps:
      - conf/mast3r.yaml
      - scripts/evaluate.py
      - data/reconstruction
      - data/extracted
      - data/train_labels.csv
      - data/train_thresholds.csv
    outs:
      - data/metrics
    params:
      - conf/mast3r.yaml:
          - type
          - imc2025_pipeline.reconstruction.mapper_min_model_size
          - imc2025_pipeline.reconstruction.mapper_max_num_models
