# conf/pipeline/imc2025/lightgluealiked/lightgluealiked-008.yaml
type: imc2025

imc2025_pipeline:
  shortlist_generator: 
    type: all_pairs

  pre_matching:
    matchers:
      - type: local_feature
        local_feature:
          type: lightglue_sift
          lightglue_sift:
            max_num_keypoints: 4096
        local_feature_matcher:
          type: lightglue
          lightglue:
            weight_path: LIGHTGLUE_WITH_SIFT
            feature_name: sift
            min_matches: 15
            width_confidence: -1.0
            depth_confidence: -1.0
            mp: true

  overlap_region_estimation:
    method: lof
    bidirectional: true
    bidirectional_merging: intersection
    bbox_expansion: 16
    border_padding: 8
    lof_n_neighbors: 100

  shortlist_updater:
    type: pre_matching_topk
    pre_matching_topk:
      topk: 3
      global_descriptors:
        - type: dinov2_salad
          similar_distance_threshold: 1.1
          batch_size: 1
          num_workers: 0
          dinov2_salad:
            weight_path: DINOV2_SALAD
            image_size: [322, 322]

  local_features:
    - type: lightglue_aliked
      lightglue_aliked:
        weight_path: ALIKED_LIGHTGLUE_N16
      resize:
        func: lightglue
        lg_resize: 1280

  local_feature_matchers:
    - type: lightglue
      lightglue:
        weight_path: LIGHTGLUE_WITH_ALIKED_N16
        feature_name: aliked
        min_matches: 15
        width_confidence: -1.0
        depth_confidence: -1.0
        mp: true

  reconstruction:
    fill_zero_Rt: false
    fill_nan_Rt: false
    fill_nearest_position: false
    mapper_min_model_size: 3
    mapper_max_num_models: 25
  
  clustering: null