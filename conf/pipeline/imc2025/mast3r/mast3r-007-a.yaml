# conf/pipeline/imc2025/mast3r/mast3r-007-a.yaml
# ------------------------------------
# ------------------------------------
type: imc2025

imc2025_pipeline:
  detector_free_matchers:
    - type: mast3r
      mast3r:
        min_matches: 15 # todo
        size: 384
        mast3r:
          use_amp: true
          weight_path: MAST3R

  shortlist_generator: 
    type: global_desc
    global_desc_model: mast3r_retrieval_spoc
    global_desc_batch_size: 1
    global_desc_num_workers: 1
    global_desc_similar_distance_threshold: 999999
    global_desc_topk: 30
    global_desc_fallback_threshold: 30
    global_desc_remove_swapped_pairs: true
    global_desc_num_refills_when_no_matches: 30
    mast3r_retrieval_spoc:
      mast3r:
        weight_path: MAST3R
        retrieval_weight_path: MAST3R_RETRIEVAL
        retrieval_codebook_path: MAST3R_RETRIEVAL_CODEBOOK
      global_desc_type: retrieval_spoc
  
  reconstruction:
    fill_zero_Rt: false
    fill_nan_Rt: false
    fill_nearest_position: false
    mapper_min_model_size: 3
    mapper_max_num_models: 25
  
  clustering:
    type: mast3r_fps
    mast3r_fps:
      mast3r_retrieval_model:
        mast3r:
          weight_path: MAST3R
          retrieval_weight_path: MAST3R_RETRIEVAL
          retrieval_codebook_path: MAST3R_RETRIEVAL_CODEBOOK
        global_desc_type: retrieval_spoc

      mast3r_matcher:
        min_matches: 15 # todo
        size: 224
        pixel_tol: 3
        mast3r:
          use_amp: true
          weight_path: MAST3R

      fps_n: 10
      fps_dist_threshold: 0.9

      limit_depth_for_exhaustive_matching: 1
      topk_for_partial_matching: 10
      num_query_from_target: 5

      min_cluster_size: 3
      use_noisy_cluster_as_one_cluster: false

      seed: 2025
      verbose: false