type: imc2025

imc2025_pipeline:
  detector_free_matchers:
    - type: mast3r
      mast3r:
        min_matches: 15 # todo
        mast3r:
          use_amp: true
          weight_path: MAST3R

  shortlist_generator: 
    type: global_desc_fps
    global_desc_model: mast3r_retrieval_spoc
    global_desc_batch_size: 1
    global_desc_num_workers: 1
    global_desc_fallback_threshold: 30
    global_desc_fps_n: 20
    global_desc_fps_k: 30
    mast3r_retrieval_spoc:
      mast3r:
        weight_path: MAST3R
        retrieval_weight_path: MAST3R_RETRIEVAL
        retrieval_codebook_path: MAST3R_RETRIEVAL_CODEBOOK
      global_desc_type: retrieval_spoc
  
  reconstruction:
    fill_zero_Rt: false
    fill_nan_Rt: false
    fill_nearest_position: false
    mapper_min_model_size: 3
    mapper_max_num_models: 25
  
  clustering: null