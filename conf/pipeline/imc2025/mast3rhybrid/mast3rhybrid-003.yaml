# conf/pipeline/imc2025/mast3rhybrid/mast3rhybrid-003.yaml
# ------------------------------------
# ------------------------------------
type: imc2025

imc2025_pipeline:
  point_tracking_matchers:
    - type: mast3r_hybrid
      impl_version: v2
      local_features:
        - type: dad
          dad:
            weight_path: DAD
            num_keypoints: 2048
        - type: magicleap_superpoint
          magicleap_superpoint:
            weight_path: MAGICLEAP_SUPERPOINT
            nms_radius: 4
            keypoint_threshold: 0.005
            max_keypoints: 2048
            remove_borders: 4
            fix_sampling: true
          resize:
            func: magicleap
            ml_resize: 1600
        - type: lightglue_aliked
          lightglue_aliked:
            weight_path: ALIKED_LIGHTGLUE_N16
            max_num_keypoints: 2048
          resize:
            func: lightglue
            lg_resize: 1280
      mast3r_hybrid:
        size: 512
        dense_min_matches: 15
        dense_subsample: 8
        dense_pixel_tol: 5
        dense_match_threshold: 1.001
        dense_match_topk: 1024
        sparse_min_matches: 15
        sparse_match_threshold: 1.001
        sparse_match_topk: null  # Use all
        model:
          use_amp: true
          weight_path: MAST3R

  shortlist_generator: 
    type: mast3r_retrieval_asmk
    mast3r_retrieval_asmk_fallback_threshold: 60
    mast3r_retrieval_asmk_remove_swapped_pairs: true
    mast3r_retrieval_asmk_make_pairs_fps_n: 20
    mast3r_retrieval_asmk_make_pairs_fps_k: 60
    mast3r_retrieval_asmk_make_pairs_fps_dist_threshold: null
    mast3r_retrieval_asmk:
      mast3r:
        weight_path: MAST3R
        retrieval_weight_path: MAST3R_RETRIEVAL
        retrieval_codebook_path: MAST3R_RETRIEVAL_CODEBOOK

  verification:
    type: custom
    ransac:
      threshold: 1.25
      confidence: 0.9999
      max_iters: 100000
      min_inliers: 16
      method: magsac
  
  reconstruction:
    fill_zero_Rt: false
    fill_nan_Rt: false
    fill_nearest_position: false
    mapper_min_model_size: 3
    mapper_max_num_models: 25
  
  clustering: null