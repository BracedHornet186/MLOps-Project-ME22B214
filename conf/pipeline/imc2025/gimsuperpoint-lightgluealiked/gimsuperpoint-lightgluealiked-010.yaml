# ------------------
# ------------------
type: imc2025

imc2025_pipeline:
  local_features:
    - type: gim_superpoint
      gim_superpoint:
        weight_path: GIM_SUPERPOINT_LIGHTGLUE
      resize:
        func: gim
        gim_resize: 1280
    - type: lightglue_aliked
      lightglue_aliked:
        weight_path: ALIKED_LIGHTGLUE_N16
      resize:
        func: lightglue
        lg_resize: 1280

  local_feature_matchers:
    - type: gim_lightglue
      gim_lightglue:
        weight_path: GIM_SUPERPOINT_LIGHTGLUE
        min_matches: 15
    - type: lightglue
      lightglue:
        weight_path: LIGHTGLUE_WITH_ALIKED_N16
        feature_name: aliked
        min_matches: 15
        width_confidence: -1.0
        depth_confidence: -1.0
        mp: true

  shortlist_generator: 
    type: all_pairs
  
  reconstruction:
    fill_zero_Rt: false
    fill_nan_Rt: false
    fill_nearest_position: false
    mapper_min_model_size: 3
    mapper_max_num_models: 25
  
  clustering:
    type: vggt
    vggt:
      model:
        pretrained_model: VGGT
      image_size: 378
      window_size: 8
      num_cycles: 5

      depth_score_threshold: null
      world_points_score_threshold: 1.3

      seed: 2025
      verbose: false