# ------------------------------------
# ------------------------------------
type: imc2025

imc2025_pipeline:
  point_tracking_matchers:
    - type: mast3r_mpsfm_sparse
      local_features:
        - type: gim_superpoint
          gim_superpoint:
            weight_path: GIM_SUPERPOINT_LIGHTGLUE
          resize:
            func: gim
            gim_resize: 1280
        - type: lightglue_aliked
          lightglue_aliked:
            weight_path: ALIKED_LIGHTGLUE_N16
          resize:
            func: lightglue
            lg_resize: 1280
      mast3r_mpsfm_sparse:
        min_matches: 15 # todo
        size: 512
        subsample: 8
        nn_score_threshold: 0.9
        score_threshold: 0
        model:
          use_amp: true
          weight_path: MAST3R

  shortlist_generator: 
    type: global_desc
    global_desc_model: mast3r_retrieval_spoc
    global_desc_batch_size: 1
    global_desc_num_workers: 1
    global_desc_similar_distance_threshold: 999999
    global_desc_topk: 50
    global_desc_fallback_threshold: 50
    global_desc_remove_swapped_pairs: true
    global_desc_num_refills_when_no_matches: 50
    mast3r_retrieval_spoc:
      mast3r:
        weight_path: MAST3R
        retrieval_weight_path: MAST3R_RETRIEVAL
        retrieval_codebook_path: MAST3R_RETRIEVAL_CODEBOOK
      global_desc_type: retrieval_spoc
  
  reconstruction:
    fill_zero_Rt: false
    fill_nan_Rt: false
    fill_nearest_position: false
    mapper_min_model_size: 3
    mapper_max_num_models: 25
  
  clustering: null