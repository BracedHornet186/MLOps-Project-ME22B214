type: imc2025

imc2025_pipeline:
  point_tracking_matchers:
    - type: vggt
      local_features:
        - type: gim_superpoint
          gim_superpoint:
            weight_path: GIM_SUPERPOINT_LIGHTGLUE
          resize:
            func: gim
            gim_resize: 1280
      vggt:
        min_matches: 15
        conf_score_threshold: 0.4
        vis_score_threshold: 0.4
        track_iters: 2

        use_custom_vggt: true  # Added
        model:
          pretrained_model: VGGT

  shortlist_generator: 
    type: mast3r_retrieval_asmk
    mast3r_retrieval_asmk_fallback_threshold: 40
    mast3r_retrieval_asmk_remove_swapped_pairs: true
    mast3r_retrieval_asmk_make_pairs_fps_n: 20
    mast3r_retrieval_asmk_make_pairs_fps_k: 40
    mast3r_retrieval_asmk_make_pairs_fps_dist_threshold: null
    mast3r_retrieval_asmk:
      mast3r:
        weight_path: MAST3R
        retrieval_weight_path: MAST3R_RETRIEVAL
        retrieval_codebook_path: MAST3R_RETRIEVAL_CODEBOOK
  
  reconstruction:
    fill_zero_Rt: false
    fill_nan_Rt: false
    fill_nearest_position: false
    mapper_min_model_size: 3
    mapper_max_num_models: 25
  
  clustering: null