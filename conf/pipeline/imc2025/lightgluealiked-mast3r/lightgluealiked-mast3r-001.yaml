# conf/pipeline/imc2025/lightgluealiked-mast3r/lightgluealiked-mast3r-001.yaml
# ------------------------------------
# ------------------------------------
type: imc2025

imc2025_pipeline:
  local_features:
    - type: lightglue_aliked
      lightglue_aliked:
        weight_path: ALIKED_LIGHTGLUE_N16
        max_num_keypoints: 512
        detection_threshold: 0.2
      resize:
        func: lightglue
        lg_resize: 1280

  local_feature_matchers:
    - type: lightglue
      lightglue:
        weight_path: LIGHTGLUE_WITH_ALIKED_N16
        feature_name: aliked
        min_matches: 15
        width_confidence: -1.0
        depth_confidence: -1.0
        mp: true

  detector_free_matchers:
    - type: mast3r
      mast3r:
        min_matches: 15 # todo
        size: 384
        mast3r:
          use_amp: true
          weight_path: MAST3R

  shortlist_generator: 
    type: mast3r_retrieval_asmk
    mast3r_retrieval_asmk_fallback_threshold: 30
    mast3r_retrieval_asmk_remove_swapped_pairs: true
    mast3r_retrieval_asmk_make_pairs_fps_n: 20
    mast3r_retrieval_asmk_make_pairs_fps_k: 10
    mast3r_retrieval_asmk_make_pairs_fps_dist_threshold: null
    mast3r_retrieval_asmk:
      mast3r:
        weight_path: MAST3R
        retrieval_weight_path: MAST3R_RETRIEVAL
        retrieval_codebook_path: MAST3R_RETRIEVAL_CODEBOOK
  
  reconstruction:
    fill_zero_Rt: false
    fill_nan_Rt: false
    fill_nearest_position: false
    mapper_min_model_size: 3
    mapper_max_num_models: 25
  
  clustering: null