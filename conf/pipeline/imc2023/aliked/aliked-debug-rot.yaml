# aliked-debug-rot
type: detector_based

detector_based_pipeline:
  local_features:
    - type: aliked
      aliked:
        weight_path: ALIKED_N32
        model_name: aliked-n32
        top_k: -1
        scores_th: 0.2
        n_limit: 4096
      resize:
        func: opencv-divisible
        long_edge_length: 1600
        antialias: true
      rotation:
        angles: [90]

  shortlist_generator: 
    type: global_desc
    global_desc_model: cvnet
    global_desc_batch_size: 1
    global_desc_num_workers: 1
    global_desc_similar_distance_threshold: 1.0
    global_desc_topk: 10
    global_desc_fallback_threshold: 20
    global_desc_remove_swapped_pairs: true
    cvnet:
      weight_path: CVNET_R101
      depth: 101
      reduction_dim: 2048
  
  matcher:
    type: openglue
    openglue:
      experiment_path: OPENGLUE_ALIKED_V1
      checkpoint_name: superglue-step100000.ckpt
      descriptor_dim: 128
      max_features: 2048
      match_threshold: 0.01
      resize_to: original

  verification:
    type: custom
    ransac:
      threshold: 2.0
      confidence: 0.999999
      max_iters: 100000
      min_inliers: 16
      method: magsac