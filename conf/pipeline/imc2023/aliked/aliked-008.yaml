# aliked-008
type: detector_based

detector_based_pipeline:
  local_features:
    - type: aliked
      aliked:
        weight_path: ALIKED_N32
        model_name: aliked-n32
        top_k: -1
        scores_th: 0.05
        n_limit: 8192
      resize:
        func: opencv-divisible
        long_edge_length: 960
        antialias: true
    - type: aliked
      aliked:
        weight_path: ALIKED_N32
        model_name: aliked-n32
        top_k: -1
        scores_th: 0.05
        n_limit: 8192
      resize:
        func: opencv-divisible
        long_edge_length: 1280
        antialias: true

  shortlist_generator: 
    type: global_desc
    global_desc_model: cvnet
    global_desc_batch_size: 1
    global_desc_num_workers: 1
    global_desc_similar_distance_threshold: 1.0
    global_desc_topk: 10
    global_desc_fallback_threshold: 20
    global_desc_remove_swapped_pairs: true
    cvnet:
      weight_path: CVNET_R101
      depth: 101
      reduction_dim: 2048
  
  matcher:
    type: nn
    nn:
      match_mode: mnn