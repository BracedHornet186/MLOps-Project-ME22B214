# mtldesc-031
type: detector_based

detector_based_pipeline:
  local_features:
    - type: mtldesc
      mtldesc:
        model:
          weight_path: MTLDESC
          detection_threshold: 0.3
        topk: 10000
      resize:
        func: kornia
        long_edge_length: 1600
        antialias: true

  shortlist_generator: 
    type: all_pairs
  
  matcher:
    type: nn
    nn:
      match_mode: mnn
      min_matches: 30

  verification:
    type: custom
    ransac:
      threshold: 2.0
      confidence: 0.999999
      max_iters: 100000
      min_inliers: 16
      method: magsac