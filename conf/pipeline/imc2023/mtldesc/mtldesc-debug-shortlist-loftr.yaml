# mtldesc-debug-shortlist-loftr
type: pre_matching_ensemble

pre_matching_ensemble_pipeline:
  shortlist_generator: 
    type: global_desc
    global_desc_model: cvnet
    global_desc_batch_size: 1
    global_desc_num_workers: 1

    # wall=0.47873753
    global_desc_similar_distance_threshold: 1.0
    global_desc_topk: 10

    # wall=0.45315614
    #global_desc_similar_distance_threshold: 9999
    #global_desc_topk: 20

    global_desc_fallback_threshold: 20
    global_desc_remove_swapped_pairs: true
    cvnet:
      weight_path: CVNET_R101
      depth: 101
      reduction_dim: 2048

  pre_matcher:
    type: loftr
    loftr:
      weight_path: LOFTR_OUTDOOR_KORNIA
      resize:
        func: kornia
        long_edge_length: 640
        antialias: true
      paired_pre_resize:
        func: same_longest_edge
        img_object_type: cv2
        cv2_interpolation: LANCZOS4
  
  shortlist_updater:
    type: pre_matching
    pre_matching:
      match_threshold: 50
      ransac:
        threshold: 2.0
        confidence: 0.9999
        max_iters: 10000
        min_inliers: 16
        method: magsac

  local_features:
    - type: mtldesc
      mtldesc:
        model:
          weight_path: MTLDESC
          detection_threshold: 0.3
        topk: 10000
      resize:
        func: kornia
        long_edge_length: 1600
        antialias: true

  local_feature_matchers:
    - type: openglue
      openglue:
        experiment_path: OPENGLUE_MTLDESC_V4
        checkpoint_name: superglue-step125000.ckpt
        descriptor_dim: 128
        max_features: 2048    # No used
        resize_to: original
        match_threshold: 0.05

  detector_free_matchers: []

  verification:
    type: custom
    ransac:
      threshold: 2.0
      confidence: 0.999999
      max_iters: 100000
      min_inliers: 16
      method: magsac