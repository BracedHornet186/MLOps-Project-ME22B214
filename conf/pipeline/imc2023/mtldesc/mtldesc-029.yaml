# mtldesc-029
type: detector_based

detector_based_pipeline:
  local_features:
    - type: mtldesc
      mtldesc:
        model:
          weight_path: MTLDESC
          detection_threshold: 0.3
        topk: 10000
      resize:
        func: kornia
        long_edge_length: 1600
        antialias: true

  shortlist_generator: 
    type: cvnet_rerank
    cvnet_rerank_batch_size: 1
    cvnet_rerank_num_workers: 1
    cvnet_rerank_alpha: 0.5
    cvnet_rerank_threshold: 1.0
    cvnet_rerank_image_size_height: 1024
    cvnet_rerank_image_size_width: 1024
    cvnet:
      weight_path: CVNET_R101
      depth: 101
      reduction_dim: 2048
  
  matcher:
    type: nn
    nn:
      match_mode: mnn

  verification:
    type: custom
    ransac:
      threshold: 2.0
      confidence: 0.999999
      max_iters: 100000
      min_inliers: 16
      method: magsac