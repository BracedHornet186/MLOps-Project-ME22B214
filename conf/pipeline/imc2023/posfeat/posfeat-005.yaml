type: detector_based

detector_based_pipeline:
  local_features:
    - type: posfeat
      posfeat:
        weight_path: POSFEAT_IMC2022
        model: PoSFeat
        detector: generate_kpts_single
        detector_config:
          num_pts: 8192
          stable: True
          use_nms: True
          nms_radius: 4
          thr: 0.9
          thr_mod: 'abs'
        loss_distance: cos
        remove_border_pad_size: 8
      resize:
        func: opencv-divisible
        long_edge_length: 1600
        divisible_factor: 16
        pad_bottom_right: false
        antialias: true

  shortlist_generator: 
    type: global_desc
    global_desc_model: cvnet
    global_desc_batch_size: 1
    global_desc_num_workers: 1
    global_desc_similar_distance_threshold: 1.0
    global_desc_topk: 10
    global_desc_fallback_threshold: 20
    global_desc_remove_swapped_pairs: true
    cvnet:
      weight_path: CVNET_R101
      depth: 101
      reduction_dim: 2048
  
  matcher:
    type: nn
    nn:
      match_mode: mnn

  verification:
    type: custom
    ransac:
      threshold: 2.0
      confidence: 0.999999
      max_iters: 100000
      min_inliers: 16
      method: magsac