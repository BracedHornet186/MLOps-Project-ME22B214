# dkm-mlsuperpoint-004
type: simple_ensemble

simple_ensemble_pipeline:
  local_features:
    # rot=0
    - type: multiscale
      multiscale:
        local_features:
          - type: magicleap_superpoint
            magicleap_superpoint:
              weight_path: MAGICLEAP_SUPERPOINT
              nms_radius: 4
              keypoint_threshold: 0.005
              max_keypoints: 2048
              remove_borders: 4
            resize:
              func: magicleap
              ml_resize: 1280
          - type: magicleap_superpoint
            magicleap_superpoint:
              weight_path: MAGICLEAP_SUPERPOINT
              nms_radius: 4
              keypoint_threshold: 0.005
              max_keypoints: 2048
              remove_borders: 4
            resize:
              func: magicleap
              ml_resize: 1600
    # rot=90
    - type: multiscale
      multiscale:
        local_features:
          - type: magicleap_superpoint
            magicleap_superpoint:
              weight_path: MAGICLEAP_SUPERPOINT
              nms_radius: 4
              keypoint_threshold: 0.005
              max_keypoints: 2048
              remove_borders: 4
            resize:
              func: magicleap
              ml_resize: 1280
            rotation:
              angles: [90]
          - type: magicleap_superpoint
            magicleap_superpoint:
              weight_path: MAGICLEAP_SUPERPOINT
              nms_radius: 4
              keypoint_threshold: 0.005
              max_keypoints: 2048
              remove_borders: 4
            resize:
              func: magicleap
              ml_resize: 1600
            rotation:
              angles: [90]
    # rot=180
    - type: multiscale
      multiscale:
        local_features:
          - type: magicleap_superpoint
            magicleap_superpoint:
              weight_path: MAGICLEAP_SUPERPOINT
              nms_radius: 4
              keypoint_threshold: 0.005
              max_keypoints: 2048
              remove_borders: 4
            resize:
              func: magicleap
              ml_resize: 1280
            rotation:
              angles: [180]
          - type: magicleap_superpoint
            magicleap_superpoint:
              weight_path: MAGICLEAP_SUPERPOINT
              nms_radius: 4
              keypoint_threshold: 0.005
              max_keypoints: 2048
              remove_borders: 4
            resize:
              func: magicleap
              ml_resize: 1600
            rotation:
              angles: [180]
    # rot=270
    - type: multiscale
      multiscale:
        local_features:
          - type: magicleap_superpoint
            magicleap_superpoint:
              weight_path: MAGICLEAP_SUPERPOINT
              nms_radius: 4
              keypoint_threshold: 0.005
              max_keypoints: 2048
              remove_borders: 4
            resize:
              func: magicleap
              ml_resize: 1280
            rotation:
              angles: [270]
          - type: magicleap_superpoint
            magicleap_superpoint:
              weight_path: MAGICLEAP_SUPERPOINT
              nms_radius: 4
              keypoint_threshold: 0.005
              max_keypoints: 2048
              remove_borders: 4
            resize:
              func: magicleap
              ml_resize: 1600
            rotation:
              angles: [270]

  local_feature_matchers:
    - type: magicleap_superglue
      magicleap_superglue:
        weight_path: MAGICLEAP_SUPERGLUE
        min_matches: null
        weights: outdoor
        sinkhorn_iterations: 30
        match_threshold: 0.2
    - type: magicleap_superglue
      magicleap_superglue:
        weight_path: MAGICLEAP_SUPERGLUE
        min_matches: null
        weights: outdoor
        sinkhorn_iterations: 30
        match_threshold: 0.2
    - type: magicleap_superglue
      magicleap_superglue:
        weight_path: MAGICLEAP_SUPERGLUE
        min_matches: null
        weights: outdoor
        sinkhorn_iterations: 30
        match_threshold: 0.2
    - type: magicleap_superglue
      magicleap_superglue:
        weight_path: MAGICLEAP_SUPERGLUE
        min_matches: null
        weights: outdoor
        sinkhorn_iterations: 30
        match_threshold: 0.2

  detector_free_matchers:
    - type: dkm
      dkm:
        weight_path: DKM_V3_OUTDOOR
        model_type: DKMv3_outdoor
        width: 540
        height: 540
        upsample_width: 864
        upsample_height: 864
        upsample_preds: true
        sample_nums: 1024

  shortlist_generator: 
    type: global_desc
    global_desc_model: cvnet
    global_desc_batch_size: 1
    global_desc_num_workers: 1
    global_desc_similar_distance_threshold: 1.0
    global_desc_topk: 10
    global_desc_fallback_threshold: 20
    global_desc_remove_swapped_pairs: true
    cvnet:
      weight_path: CVNET_R101
      depth: 101
      reduction_dim: 2048
  
  verification:
    type: custom
    ransac:
      threshold: 2.0
      confidence: 0.999999
      max_iters: 100000
      min_inliers: 16
      method: magsac