# mtldesc-quadtree-001
type: simple_ensemble

simple_ensemble_pipeline:
  local_features:
    - type: mtldesc
      mtldesc:
        model:
          weight_path: MTLDESC
          detection_threshold: 0.3
        topk: 4096
      resize:
        func: kornia
        long_edge_length: 1600
        antialias: true
  
  local_feature_matchers:
    - type: nn
      nn:
        match_mode: mnn
  
  detector_free_matchers:
    - type: quadtree
      quadtree:
        weight_path: QUADTREE_OUTDOOR
        confidence_threshold: 0.1
        resize:
          func: opencv-divisible
          long_edge_length: 1024
          antialias: true
          divisible_factor: 32
          pad_bottom_right: true

  shortlist_generator: 
    type: global_desc
    global_desc_model: cvnet
    global_desc_batch_size: 1
    global_desc_num_workers: 1
    global_desc_similar_distance_threshold: 1.0
    global_desc_topk: 10
    global_desc_fallback_threshold: 20
    global_desc_remove_swapped_pairs: true
    cvnet:
      weight_path: CVNET_R101
      depth: 101
      reduction_dim: 2048

  verification:
    type: custom
    ransac:
      threshold: 2.0
      confidence: 0.999999
      max_iters: 100000
      min_inliers: 16
      method: magsac