type: detector_free

detector_free_pipeline:
  shortlist_generator: 
    type: global_desc
    global_desc_model: cvnet
    global_desc_batch_size: 1
    global_desc_num_workers: 1
    global_desc_similar_distance_threshold: 0.6
    global_desc_topk: 10
    global_desc_fallback_threshold: 20
    cvnet:
      weight_path: CVNET_R101
      depth: 101
      reduction_dim: 2048
  
  matcher:
    type: se2loftr
    se2loftr:
      weight_path: SE2LOFTR_BIG
      config_file_path: SE2LOFTR_BIG_CONFIG_FILE
      match_coarse_thr: null
      resize:
        func: opencv-divisible
        long_edge_length: 640
        antialias: true
        divisible_factor: 8
        pad_bottom_right: true
