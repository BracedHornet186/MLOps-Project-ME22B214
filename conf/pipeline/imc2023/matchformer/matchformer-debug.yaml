type: detector_free

detector_free_pipeline:
  shortlist_generator: 
    type: global_desc
    global_desc_model: cvnet
    global_desc_batch_size: 1
    global_desc_num_workers: 1
    global_desc_similar_distance_threshold: 0.8
    global_desc_topk: 10
    global_desc_fallback_threshold: 20
    global_desc_remove_swapped_pairs: true
    cvnet:
      weight_path: CVNET_R101
      depth: 101
      reduction_dim: 2048
  
  matcher:
    type: matchformer
    matchformer:
      weight_path: MATCHFORMER_OUTDOOR_LARGE_LA
      backbone_type: largela
      match_coarse_thr: null
      resize:
        func: opencv-divisible
        long_edge_length: 1024
        antialias: true
        divisible_factor: 8
        pad_bottom_right: true
