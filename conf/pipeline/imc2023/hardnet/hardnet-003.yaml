# hardnet-003
type: simple_ensemble

simple_ensemble_pipeline:
  local_features:
    - type: hardnet
      hardnet:
        orinet_weight_path: ORINET
        keynet_weight_path: KEYNET
        affnet_weight_path: AFFNET
        hardnet_weight_path: HARDNET_LIB
        detector: sift
        num_features: 8000
      resize:
        func: kornia
        long_edge_length: 1024
        #antialias: true

  local_feature_matchers:
    - type: openglue
      openglue:
        experiment_path: OPENGLUE_HARDNET
        checkpoint_name: openglue_SIFT-Affnet-Hardnet.ckpt
        descriptor_dim: 128
        max_features: 2048    # No used
        resize_to: original
        match_threshold: 0.2

  shortlist_generator: 
    type: global_desc
    global_desc_model: cvnet
    global_desc_batch_size: 1
    global_desc_num_workers: 1
    global_desc_similar_distance_threshold: 1.0
    global_desc_topk: 10
    global_desc_fallback_threshold: 20
    global_desc_remove_swapped_pairs: true
    cvnet:
      weight_path: CVNET_R101
      depth: 101
      reduction_dim: 2048
  
  verification:
    type: custom
    ransac:
      threshold: 2.0
      confidence: 0.999999
      max_iters: 100000
      min_inliers: 16
      method: magsac