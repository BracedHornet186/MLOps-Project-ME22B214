# conf/pipeline/imc2024/dedode/dedode-002.yaml
type: detector_based

detector_based_pipeline:
  local_features:
    - type: dedode
      dedode:
        detector_weight_path: DEDODE_DETECTOR_L
        descriptor_weight_path: DEDODE_DESCRIPTOR_B
        detector_model_name: L-upright
        descriptor_model_name: B-upright
        num_features: 10000
      resize:
        func: kornia
        long_edge_length: 1600
        antialias: true

  shortlist_generator: 
    type: global_desc
    global_desc_model: dinov2
    global_desc_batch_size: 1
    global_desc_num_workers: 1
    global_desc_similar_distance_threshold: 0.3
    global_desc_topk: 20
    global_desc_fallback_threshold: 20
    dinov2:
      pretrained_model: DINOV2_BASE
  
  matcher:
    type: lightglue
    lightglue:
      weight_path: LIGHTGLUE_WITH_DEDODE_B
      feature_name: dedodeb
      min_matches: 15
      width_confidence: -1.0
      depth_confidence: -1.0
      mp: true