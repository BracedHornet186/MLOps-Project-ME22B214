# conf/pipeline/imc2024/dedode/dedode-011.yaml
type: detector_based

detector_based_pipeline:
  local_features:
    - type: dedode
      dedode:
        detector_weight_path: DEDODE_DETECTOR_L
        descriptor_weight_path: DEDODE_DESCRIPTOR_B
        detector_model_name: L-upright
        descriptor_model_name: B-upright
        num_features: 10000
      resize:
        func: kornia
        size: [784, 784]
        antialias: true

  shortlist_generator: 
    type: global_desc
    global_desc_model: dinov2
    global_desc_batch_size: 1
    global_desc_num_workers: 1
    global_desc_similar_distance_threshold: 0.3
    global_desc_topk: 30
    global_desc_fallback_threshold: 30
    global_desc_remove_swapped_pairs: true
    global_desc_num_refills_when_no_matches: 30
    dinov2:
      pretrained_model: DINOV2_BASE
  
  matcher:
    type: steerer
    steerer:
      # Setting A
      weight_path: STEERER_B_C4_STEERER_SETTING_A
      matcher_type: MaxMatchesMatcher
      steerer_order: 4
      min_matches: 15
      use_overlap_region_cropper: false