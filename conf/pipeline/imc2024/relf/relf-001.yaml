# conf/pipeline/imc2024/relf/relf-001.yaml
type: detector_based

detector_based_pipeline:
  local_features:
    - type: relf
      relf:
        weight_path: RELF_RN18
        descriptor:
          name: re_resnet
          num_group: 16
          channels: 64
          candidate: '0.6'
          multi_gpu: '-1'
        detector:
          type: lightglue_aliked
          lightglue_aliked:
            weight_path: ALIKED_LIGHTGLUE_N16
          resize:
            func: lightglue
            lg_resize: 1280
      resize:
        func: kornia
        long_edge_length: 1280
        antialias: true

  shortlist_generator: 
    type: global_desc
    global_desc_model: dinov2
    global_desc_batch_size: 1
    global_desc_num_workers: 1
    global_desc_similar_distance_threshold: 0.3
    global_desc_topk: 30
    global_desc_fallback_threshold: 30
    global_desc_remove_swapped_pairs: true
    global_desc_num_refills_when_no_matches: 30
    dinov2:
      pretrained_model: DINOV2_BASE
  
  matcher:
    type: nn
    nn:
      match_mode: smnn
      th: 0.99

  verification:
    type: custom
    ransac:
      threshold: 2.0
      confidence: 0.999999
      max_iters: 100000
      min_inliers: 16
      method: magsac