# conf/pipeline/imc2024/ensemble2/lightgluealiked-mtldesc-posfeat-001.yaml
type: imc2024

imc2024_pipeline:
  shortlist_generator: 
    type: all_pairs
  
  pre_matching:
    matchers:
      - type: local_feature
        local_feature:
          type: lightglue_aliked
          lightglue_aliked:
            weight_path: ALIKED_LIGHTGLUE_N16
          resize:
            func: lightglue
            lg_resize: 960
        local_feature_matcher:
          type: lightglue
          lightglue:
            weight_path: LIGHTGLUE_WITH_ALIKED_N16
            feature_name: aliked
            min_matches: 15
            width_confidence: -1.0
            depth_confidence: -1.0
            mp: true
      - type: local_feature
        local_feature:
          type: lightglue_sift
          lightglue_sift:
            max_num_keypoints: 4096
        local_feature_matcher:
          type: lightglue
          lightglue:
            weight_path: LIGHTGLUE_WITH_SIFT
            feature_name: sift
            min_matches: 15
            width_confidence: -1.0
            depth_confidence: -1.0
            mp: true
  
  overlap_region_estimation:
    method: lof
    bidirectional: true
    bidirectional_merging: intersection
    bbox_expansion: 16
    border_padding: 8
    lof_n_neighbors: 100
  
  masking:
    make_watermark_masks: true
    watermark_overlap_delta: 10
    watermark_border_delta: 30
    rerun_overlap_estimation: true
  
  shortlist_updater:
    type: pre_matching
    pre_matching:
      match_threshold: 50
      aggregation_type: union
      global_descriptors:
        - type: cvnet 
          similar_distance_threshold: 0.6
          batch_size: 1
          num_workers: 1
          cvnet:
            weight_path: CVNET_R101
            depth: 101
            reduction_dim: 2048
        #- type: dinov2
        #  similar_distance_threshold: 0.2
        #  batch_size: 1
        #  num_workers: 1
        #  dinov2:
        #    pretrained_model: DINOV2_BASE
  
  local_features:
    - type: lightglue_aliked
      lightglue_aliked:
        weight_path: ALIKED_LIGHTGLUE_N16
      resize:
        func: lightglue
        lg_resize: 1280
    - type: mtldesc
      mtldesc:
        model:
          weight_path: MTLDESC
          detection_threshold: 0.3
        topk: 4096
      resize:
        func: kornia
        long_edge_length: 1600
        antialias: true
    - type: posfeat
      posfeat:
        weight_path: POSFEAT_IMC2022
        model: PoSFeat
        detector: generate_kpts_single
        detector_config:
          num_pts: 2048
          stable: True
          use_nms: True
          nms_radius: 4
          thr: 0.9
          thr_mod: 'abs'
        loss_distance: cos
        remove_border_pad_size: 8
      resize:
        func: opencv-divisible
        long_edge_length: 1600
        divisible_factor: 16
        pad_bottom_right: false
        antialias: true

  local_feature_matchers:
    - type: lightglue
      lightglue:
        weight_path: LIGHTGLUE_WITH_ALIKED_N16
        feature_name: aliked
        min_matches: 15
        use_overlap_region_cropper: true
        width_confidence: -1.0
        depth_confidence: -1.0
        mp: true
    - type: nn
      nn:
        match_mode: mnn
        min_matches: 15
        use_overlap_region_cropper: true
    - type: nn
      nn:
        match_mode: mnn
        min_matches: 15
        use_overlap_region_cropper: true

  detector_free_matchers: []

  reconstruction:
    mapper_min_model_size: 3
    mapper_max_num_models: 2