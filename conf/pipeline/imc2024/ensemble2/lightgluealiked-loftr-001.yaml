# conf/pipeline/imc2024/ensemble2/lightgluealiked-loftr-001.yaml
type: simple_ensemble

simple_ensemble_pipeline:
  local_features:
    - type: featureset
      featureset:
        local_features:
          - type: lightglue_aliked
            lightglue_aliked:
              weight_path: ALIKED_LIGHTGLUE_N16
            resize:
              func: lightglue
              lg_resize: 1024
          - type: lightglue_aliked
            lightglue_aliked:
              weight_path: ALIKED_LIGHTGLUE_N16
            resize:
              func: lightglue
              lg_resize: 1280
    - type: lightglue_sift
      lightglue_sift:
        max_num_keypoints: 4096
  
  local_feature_matchers:
    - type: lightglue
      lightglue:
        weight_path: LIGHTGLUE_WITH_ALIKED_N16
        feature_name: aliked
        min_matches: 15
        width_confidence: -1.0
        depth_confidence: -1.0
        mp: true
    - type: lightglue
      lightglue:
        weight_path: LIGHTGLUE_WITH_SIFT
        feature_name: sift
        min_matches: 15
        width_confidence: -1.0
        depth_confidence: -1.0
        mp: true
  
  detector_free_matchers:
    - type: loftr
      loftr:
        weight_path: LOFTR_OUTDOOR_KORNIA
        resize:
          func: kornia
          long_edge_length: 960
          antialias: true

  shortlist_generator: 
    type: global_desc
    global_desc_model: dinov2
    global_desc_batch_size: 1
    global_desc_num_workers: 1
    global_desc_similar_distance_threshold: 0.3
    global_desc_topk: 30
    global_desc_fallback_threshold: 30
    global_desc_remove_swapped_pairs: true
    global_desc_num_refills_when_no_matches: 30
    dinov2:
      pretrained_model: DINOV2_BASE

  reconstruction:
    mapper_min_model_size: 3
    mapper_max_num_models: 2