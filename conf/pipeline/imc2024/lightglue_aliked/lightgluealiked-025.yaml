# conf/pipeline/imc2024/lightglue_aliked/lightgluealiked-025.yaml
type: detector_based

detector_based_pipeline:
  local_features:
    - type: lightglue_aliked
      lightglue_aliked:
        weight_path: ALIKED_LIGHTGLUE_N16
      resize:
        func: lightglue
        lg_resize: 1280

  shortlist_generator: 
    type: all_pairs
  
  matcher:
    type: lightglue
    lightglue:
      weight_path: LIGHTGLUE_WITH_ALIKED_N16
      feature_name: aliked
      min_matches: 15
      width_confidence: -1.0
      depth_confidence: -1.0
      mp: true
  
  reconstruction:
    mapper_min_model_size: 3
    mapper_max_num_models: 2