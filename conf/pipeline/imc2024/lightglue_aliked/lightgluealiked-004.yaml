# conf/pipeline/imc2024/lightglue_aliked/lightgluealiked-004.yaml
type: detector_based

detector_based_pipeline:
  local_features:
    - type: lightglue_aliked
      lightglue_aliked:
        weight_path: ALIKED_LIGHTGLUE_N16
      resize:
        func: lightglue
        lg_resize: 1280

  shortlist_generator: 
    type: global_desc
    global_desc_model: dinov2
    global_desc_batch_size: 1
    global_desc_num_workers: 1
    global_desc_similar_distance_threshold: 0.3
    global_desc_topk: 20
    global_desc_fallback_threshold: 20
    dinov2:
      pretrained_model: DINOV2_BASE
  
  matcher:
    type: lightglue
    lightglue:
      weight_path: LIGHTGLUE_WITH_ALIKED_N16
      feature_name: aliked
      min_matches: 15
      width_confidence: -1.0
      depth_confidence: -1.0
      mp: true
  
  reconstruction:
    mapper_min_model_size: 3
    mapper_max_num_models: 2