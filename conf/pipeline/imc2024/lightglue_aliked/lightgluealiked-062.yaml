# conf/pipeline/imc2024/lightglue_aliked/lightgluealiked-062.yaml
# ** 061 + Line2D-based prematching
# !!! Bad overlap estimation
type: imc2024

imc2024_pipeline:
  shortlist_generator: 
    type: all_pairs
  
  pre_matching:
    matchers:
      - type: local_feature
        local_feature:
          type: lightglue_aliked
          extract_from_pre_sampled_keypoints: true
          pre_sampled_keypoints_interpolation_num: 10
          lightglue_aliked:
            weight_path: ALIKED_LIGHTGLUE_N16
            implement_version: v2
          resize:
            func: lightglue
            lg_resize: 960
        local_feature_matcher:
          type: lightglue
          lightglue:
            weight_path: LIGHTGLUE_WITH_ALIKED_N16
            feature_name: aliked
            min_matches: 15
            width_confidence: -1.0
            depth_confidence: -1.0
            mp: true
  
  overlap_region_estimation:
    method: lof
    bidirectional: true
    bidirectional_merging: intersection
    bbox_expansion: 16
    border_padding: 8
    lof_n_neighbors: 100
  
  masking:
    make_watermark_masks: true
    watermark_overlap_delta: 10
    watermark_border_delta: 30
    rerun_overlap_estimation: true
  
  shortlist_updater:
    type: pre_matching
    pre_matching:
      match_threshold: 10   # For line-based points
      aggregation_type: union
      global_descriptors:
        - type: dinov2_salad
          similar_distance_threshold: 1.1
          batch_size: 1
          num_workers: 0
          dinov2_salad:
            weight_path: DINOV2_SALAD
            image_size: [322, 322]

  line2d_features:
    - type: limap
      resize:
        long_edge_length: 640
      limap:
        detector_method: deeplsd
        detector_weight_path: LIMAP_MODELS
        extractor_method: wireframe
        extractor_weight_path: LIMAP_MODELS
  
  line2d_matchers:
    - type: limap
      limap:
        matcher_method: gluestick
        extractor_method: wireframe
        matcher_weight_path: LIMAP_MODELS
        extractor_weight_path: LIMAP_MODELS
  
  local_features:
    - type: lightglue_aliked_tile
      lightglue_aliked_tile:
        weight_path: ALIKED_LIGHTGLUE_N16
        max_tile_size: 1280
        implement_version: v2
        max_num_keypoints: 4096
        detection_threshold: 0.01
        topk_after_merge: 4096
        threshold_after_merge: 0.05

  local_feature_matchers:
    - type: lightglue
      lightglue:
        weight_path: LIGHTGLUE_WITH_ALIKED_N16
        feature_name: aliked
        min_matches: 15
        width_confidence: -1.0
        depth_confidence: -1.0
        mp: true

  detector_free_matchers: []

  reconstruction:
    use_localize_sfm: true
    mapper_min_model_size: 3
    mapper_max_num_models: 2