type: localizer

localizer_pipeline:
  shortlist_generator: 
    type: all_pairs
  
  depth_estimation:
    type: depth_anything
    hf_weight_path: HF_DEPTH_ANYTHING_LARGE
    keep_raw_prediction: true
  
  localizer:
    type: mapfree
    mapfree:
      matcher:
        type: matchformer
        matchformer:
          weight_path: MATCHFORMER_OUTDOOR_LARGE_LA
          backbone_type: largela
          match_coarse_thr: 0.15
          min_matches: 15
          topk: 1024
          resize:
            func: opencv-divisible
            long_edge_length: 800
            antialias: true
            divisible_factor: 8
            pad_bottom_right: true
      pose_solver: pnp