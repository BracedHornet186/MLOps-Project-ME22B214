# conf/pipeline/imc2024/ensemble2/lightgluealiked-gimsuperpoint-003.yaml
# lizard(n=20)
# 0.353 (threshold: 0.35)
# 0.412 (threshold: 0.30)

type: imc2024

imc2024_pipeline:
  shortlist_generator: 
    type: all_pairs

  segmentation:
    type: grounded_sam
    resize: 800

    grounded_sam:
      detector:
        pretrained_model: HF_GROUNDING_DINO_BASE
      segmentator:
        pretrained_model: HF_SAM_VIT_BASE

      mode: pos-only

      threshold: 0.3
      labels: ["a tree.", "a bush.", "a pond.", "a lake.", "a sea.",
               "a river.", "a house.", "a building.", "a landmark.",
               "a monument.", "a block.", "a rock.", "a stone.", "a wall."]
      positive_labels: ["a house.", "a building.", "a landmark.", "a monument.",
                        "a block.", "a rock.", "a stone.", "a wall."]
      negative_labels: ["a tree.", "a bush.", "a pond.", "a lake.", "a sea.", "a river."]
  
  pre_matching:
    matchers:
      - type: local_feature
        local_feature:
          type: lightglue_aliked
          lightglue_aliked:
            weight_path: ALIKED_LIGHTGLUE_N16
          resize:
            func: lightglue
            lg_resize: 960
        local_feature_matcher:
          type: lightglue
          lightglue:
            weight_path: LIGHTGLUE_WITH_ALIKED_N16
            feature_name: aliked
            min_matches: 15
            width_confidence: -1.0
            depth_confidence: -1.0
            mp: true
      - type: local_feature
        local_feature:
          type: lightglue_sift
          lightglue_sift:
            max_num_keypoints: 4096
        local_feature_matcher:
          type: lightglue
          lightglue:
            weight_path: LIGHTGLUE_WITH_SIFT
            feature_name: sift
            min_matches: 15
            width_confidence: -1.0
            depth_confidence: -1.0
            mp: true
  
  overlap_region_estimation:
    method: lof
    bidirectional: true
    bidirectional_merging: intersection
    bbox_expansion: 16
    border_padding: 8
    lof_n_neighbors: 100
  
  masking:
    make_watermark_masks: true
    watermark_overlap_delta: 10
    watermark_border_delta: 30
    rerun_overlap_estimation: true
  
  local_features:
    - type: lightglue_aliked
      lightglue_aliked:
        weight_path: ALIKED_LIGHTGLUE_N16
      resize:
        func: lightglue
        lg_resize: 1280
    - type: gim_superpoint
      gim_superpoint:
        weight_path: GIM_SUPERPOINT_LIGHTGLUE
      resize:
        func: gim
        gim_resize: 1280

  local_feature_matchers:
    - type: lightglue
      lightglue:
        weight_path: LIGHTGLUE_WITH_ALIKED_N16
        feature_name: aliked
        min_matches: 15
        width_confidence: -1.0
        depth_confidence: -1.0
        mp: true
    - type: gim_lightglue
      gim_lightglue:
        weight_path: GIM_SUPERPOINT_LIGHTGLUE
        min_matches: 15

  detector_free_matchers: []

  reconstruction:
    use_localize_sfm: true
    mapper_min_model_size: 3
    mapper_max_num_models: 3