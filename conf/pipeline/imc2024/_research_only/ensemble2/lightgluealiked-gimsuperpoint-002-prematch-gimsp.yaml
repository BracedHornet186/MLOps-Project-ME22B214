# conf/pipeline/imc2024/ensemble2/lightgluealiked-gimsuperpoint-002.yaml

# lizard(n=20)
# prematch(aliked+lg, sift+lg): 0.549
# prematch(aliked+lg, gimsp+lg, sift+lg): 0.578
# prematch(aliked+lg, gimsp+lg): 0.578
# prematch(gimsp+lg, sift+lg): 0.539

type: imc2024

imc2024_pipeline:
  shortlist_generator: 
    type: all_pairs
  
  pre_matching:
    matchers:
      - type: local_feature
        local_feature:
          type: gim_superpoint
          gim_superpoint:
            weight_path: GIM_SUPERPOINT_LIGHTGLUE
          resize:
            func: gim
            gim_resize: 960
        local_feature_matcher:
          type: gim_lightglue
          gim_lightglue:
            weight_path: GIM_SUPERPOINT_LIGHTGLUE
            min_matches: 15
      #- type: local_feature
      #  local_feature:
      #    type: lightglue_aliked
      #    lightglue_aliked:
      #      weight_path: ALIKED_LIGHTGLUE_N16
      #    resize:
      #      func: lightglue
      #      lg_resize: 960
      #  local_feature_matcher:
      #    type: lightglue
      #    lightglue:
      #      weight_path: LIGHTGLUE_WITH_ALIKED_N16
      #      feature_name: aliked
      #      min_matches: 15
      #      width_confidence: -1.0
      #      depth_confidence: -1.0
      #      mp: true
      - type: local_feature
        local_feature:
          type: lightglue_sift
          lightglue_sift:
            max_num_keypoints: 4096
        local_feature_matcher:
          type: lightglue
          lightglue:
            weight_path: LIGHTGLUE_WITH_SIFT
            feature_name: sift
            min_matches: 15
            width_confidence: -1.0
            depth_confidence: -1.0
            mp: true
  
  overlap_region_estimation:
    method: lof
    bidirectional: true
    bidirectional_merging: intersection
    bbox_expansion: 16
    border_padding: 8
    lof_n_neighbors: 100
  
  masking:
    make_watermark_masks: true
    watermark_overlap_delta: 10
    watermark_border_delta: 30
    rerun_overlap_estimation: true
  
  shortlist_updater:
    type: pre_matching
    pre_matching:
      match_threshold: 50
      aggregation_type: union
      global_descriptors:
        - type: dinov2_salad
          similar_distance_threshold: 1.1
          batch_size: 1
          num_workers: 0
          dinov2_salad:
            weight_path: DINOV2_SALAD
            image_size: [322, 322]
  
  local_features:
    - type: lightglue_aliked
      lightglue_aliked:
        weight_path: ALIKED_LIGHTGLUE_N16
      resize:
        func: lightglue
        lg_resize: 1280
    - type: gim_superpoint
      gim_superpoint:
        weight_path: GIM_SUPERPOINT_LIGHTGLUE
      resize:
        func: gim
        gim_resize: 1280

  local_feature_matchers:
    - type: lightglue
      lightglue:
        weight_path: LIGHTGLUE_WITH_ALIKED_N16
        feature_name: aliked
        min_matches: 15
        width_confidence: -1.0
        depth_confidence: -1.0
        mp: true
    - type: gim_lightglue
      gim_lightglue:
        weight_path: GIM_SUPERPOINT_LIGHTGLUE
        min_matches: 15

  detector_free_matchers: []

  reconstruction:
    use_localize_sfm: true
    mapper_min_model_size: 3
    mapper_max_num_models: 3