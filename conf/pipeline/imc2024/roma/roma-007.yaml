# conf/pipeline/imc2024/roma/roma-007.yaml
# | conf/pipeline/imc2024/roma/roma-005.yaml
type: detector_free

detector_free_pipeline:
  shortlist_generator: 
    type: global_desc
    global_desc_model: dinov2
    global_desc_batch_size: 1
    global_desc_num_workers: 1
    global_desc_similar_distance_threshold: 0.3
    global_desc_topk: 30
    global_desc_fallback_threshold: 30
    global_desc_remove_swapped_pairs: true
    global_desc_num_refills_when_no_matches: 30
    dinov2:
      pretrained_model: DINOV2_BASE
  
  matcher:
    type: roma
    roma:
      weight_path: ROMA_OUTDOOR
      dinov2_weight_path: ROMA_DINO_V2
      model_type: outdoor
      coarse_res: 560
      upsample_res: 864
      upsample_preds: false
      sample_threshold: 0.2
      sample_nums: 4096

  hloc_match_dense:
    max_error: 4
    cell_size: 4
    max_keypoints: 8192

  verification:
    type: custom
    ransac:
      threshold: 2.0
      confidence: 0.999999
      max_iters: 100000
      min_inliers: 16
      method: magsac