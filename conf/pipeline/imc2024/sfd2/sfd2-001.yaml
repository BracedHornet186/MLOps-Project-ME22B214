# conf/pipeline/imc2024/sfd2/sfd2-001.yaml
type: detector_based

detector_based_pipeline:
  local_features:
    - type: sfd2
      sfd2:
        weight_path: SFD2
        model_name: ressegnetv2
        use_stability: true
        max_keypoints: 4096
        conf_th: 0.001
        mulsitscale: False
        scales: [1.0]
      resize:
        func: opencv-divisible
        long_edge_length: 1280
        antialias: true

  shortlist_generator: 
    type: global_desc
    global_desc_model: dinov2
    global_desc_batch_size: 1
    global_desc_num_workers: 1
    global_desc_similar_distance_threshold: 0.3
    global_desc_topk: 30
    global_desc_fallback_threshold: 30
    global_desc_remove_swapped_pairs: true
    global_desc_num_refills_when_no_matches: 30
    dinov2:
      pretrained_model: DINOV2_BASE
  
  matcher:
    type: nn
    nn:
      match_mode: mnn

  reconstruction:
    mapper_min_model_size: 3
    mapper_max_num_models: 2