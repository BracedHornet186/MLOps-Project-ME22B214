# conf/pipeline/imc2024/mtldesc/mtldesc-003.yaml
type: detector_based

detector_based_pipeline:
  local_features:
    - type: mtldesc
      mtldesc:
        model:
          weight_path: MTLDESC
          detection_threshold: 0.3
        topk: 10000
      resize:
        func: kornia
        long_edge_length: 1600
        antialias: true

  shortlist_generator: 
    type: global_desc
    global_desc_model: dinov2
    global_desc_batch_size: 1
    global_desc_num_workers: 1
    global_desc_similar_distance_threshold: 0.3
    global_desc_topk: 30
    global_desc_fallback_threshold: 30
    global_desc_remove_swapped_pairs: true
    global_desc_num_refills_when_no_matches: 30
    dinov2:
      pretrained_model: DINOV2_BASE
  
  matcher:
    type: nn
    nn:
      match_mode: mnn

  verification:
    type: custom
    ransac:
      threshold: 2.0
      confidence: 0.999999
      max_iters: 100000
      min_inliers: 16
      method: magsac

  reconstruction:
    mapper_min_model_size: 3
    mapper_max_num_models: 2