# conf/pipeline/imc2024/aliked/aliked-001.yaml
type: detector_based

detector_based_pipeline:
  local_features:
    - type: aliked
      aliked:
        weight_path: ALIKED_N32
        model_name: aliked-n32
        top_k: -1
        scores_th: 0.01
        n_limit: 4096
      resize:
        func: opencv-divisible
        long_edge_length: 1024
        antialias: true

  shortlist_generator: 
    type: global_desc
    global_desc_model: dinov2
    global_desc_batch_size: 1
    global_desc_num_workers: 1
    global_desc_similar_distance_threshold: 0.3
    global_desc_topk: 20
    global_desc_fallback_threshold: 20
    dinov2:
      pretrained_model: DINOV2_BASE
  
  matcher:
    type: nn
    nn:
      match_mode: mnn