# conf/pipeline/imc2024/loftr/loftr-001.yaml
type: detector_free

detector_free_pipeline:
  shortlist_generator: 
    type: global_desc
    global_desc_model: dinov2
    global_desc_batch_size: 1
    global_desc_num_workers: 1
    global_desc_similar_distance_threshold: 0.3
    global_desc_topk: 20
    global_desc_fallback_threshold: 20
    dinov2:
      pretrained_model: DINOV2_BASE
  
  matcher:
    type: loftr
    loftr:
      weight_path: LOFTR_OUTDOOR_KORNIA
      resize:
        func: kornia
        small_edge_length: 640
        antialias: true
