# conf/pipeline/imc2024/se2loftr/se2loftr-002.yaml
type: detector_free

detector_free_pipeline:
  shortlist_generator: 
    type: global_desc
    global_desc_model: dinov2
    global_desc_batch_size: 1
    global_desc_num_workers: 1
    global_desc_similar_distance_threshold: 0.3
    global_desc_topk: 30
    global_desc_fallback_threshold: 30
    global_desc_remove_swapped_pairs: true
    global_desc_num_refills_when_no_matches: 30
    dinov2:
      pretrained_model: DINOV2_BASE
  
  matcher:
    type: se2loftr
    se2loftr:
      weight_path: SE2LOFTR_BIG
      config_file_path: SE2LOFTR_BIG_CONFIG_FILE
      match_coarse_thr: null
      confidence_threshold: 0.4
      topk: 1024
      resize:
        func: opencv-divisible
        long_edge_length: 960
        antialias: true
        divisible_factor: 8
        pad_bottom_right: true

  reconstruction:
    mapper_min_model_size: 3
    mapper_max_num_models: 2