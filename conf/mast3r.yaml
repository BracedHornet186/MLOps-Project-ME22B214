# conf/mast3r.yaml
# ─────────────────────────────────────────────────────────────────────────────
# Pipeline config tuned for a single GPU.
# Uses MASt3R hybrid matcher (semi-dense + ALIKED keypoints).
# Shortlist: MASt3R-ASMK + DINOv2 + ISC (SPoC skipped to save VRAM).
# ─────────────────────────────────────────────────────────────────────────────
type: imc2025_mast3r

imc2025_mast3r_pipeline:

  seed: 2025

  # ── Clustering ────────────────────────────────────────────────────────────
  # FPS-based pre-clustering so large scenes are split before matching.
  clustering:
    type: mast3r_fps
    mast3r_fps:
      n_fps_seeds: 5          # number of FPS seed images per dataset
      min_cluster_size: 3
      max_cluster_size: 60    # keep clusters small enough for 12 GB VRAM

  # ── Shortlist generation ──────────────────────────────────────────────────
  # Union of three retrievers; ASMK dominates, DINOv2+ISC add diversity.
  shortlist_generator:
    type: ensemble
    ensemble:
      generators:
        - type: mast3r_retrieval_asmk
          mast3r_retrieval_asmk:
            retriever:
              type: mast3r_retrieval_asmk
              mast3r_retrieval_asmk:
                mast3r:
                  weight_path: MAST3R
                  retrieval_weight_path: MAST3R_RETRIEVAL
                  retrieval_codebook_path: MAST3R_RETRIEVAL_CODEBOOK
            topk: 20          # top-20 neighbors per image from ASMK
        - type: global_descriptor
          global_descriptor:
            global_desc_model: dinov2
            dinov2:
              pretrained_model: DINOV2_BASE
              options:
                pooling_type: max
            batch_size: 8
            topk: 10
        - type: global_descriptor
          global_descriptor:
            global_desc_model: isc
            isc:
              weight_path: ISC
            batch_size: 8
            topk: 10
      dedup: true             # remove duplicate pairs across generators

  # ── MASt3R hybrid matcher ─────────────────────────────────────────────────
  # Mode: complementary — reuse clustering matches, fill gaps with MASt3R.
  matcher:
    model_path: MAST3R
    imsize: 512
    dense_subsample: 8        # subsample factor for semi-dense grid
    dense_pixel_tol: 5        # pixel tolerance for reciprocal NN
    threshold: 1.001

  # ── Additional sparse detectors (fed into MASt3R local descriptor head) ──
  # Inspired by MP-SfM — ALIKED keypoints improve coverage in textureless areas.
  matcher_hybrid:
    type: mast3r_hybrid
    mast3r_hybrid:
      model_path: MAST3R
      imsize: 512
      local_features:
        - type: aliked
          aliked:
            weight_path: ALIKED_LIGHTGLUE_N16
            max_num_keypoints: 2048   # 2048 keeps VRAM under 10 GB on RTX 3060
            resize:
              func: lightglue
              lg_resize: 1024         # downscale to 1024 for VRAM budget
        - type: superpoint
          superpoint:
            weight_path: MAGICLEAP_SUPERPOINT
            max_num_keypoints: 2048
            resize:
              func: superpoint
              target_size_height: 1024
              target_size_width: 1024
            nms_radius: 3
            keypoint_threshold: 0.0005
      apply_round: true
      impl_version: v2
      mkpts_decoupling_method: imc2023

  matching_stage_mode: hybrid_matcher_override

  round_matched_keypoints: true

  # ── Geometric verification ────────────────────────────────────────────────
  verification:
    type: colmap
    ransac:
      threshold: 4.0
      confidence: 0.999999
      max_iters: 100000

  # ── COLMAP reconstruction ─────────────────────────────────────────────────
  reconstruction:
    camera_model: simple-radial
    fill_nan_Rt: true           # unregistered cameras → NaN (not zero)
    mapper_min_model_size: 3
    mapper_max_num_models: 25
    mapper_min_num_matches: 15
    mapper_multiple_models: true

  # ── Shortlist inside each cluster ─────────────────────────────────────────
  shortlist_generator_in_clustering:
    type: topk
    topk:
      k: 15
