# ─────────────────────────────────────────────────────────────────────────────
# Scene Reconstruction — MLOps stack
#
# Services:
#   Airflow stack  : postgres, redis, apiserver(:8080), scheduler,
#                    dag-processor, worker, triggerer, init
#   MLflow         : tracking server on :5000
#
# Project layout mounted into every Airflow container:
#   ./dags        → /opt/airflow/dags      (Airflow DAG files)
#   ./logs        → /opt/airflow/logs
#   ./config      → /opt/airflow/config
#   ./plugins     → /opt/airflow/plugins
#   ./scripts     → /opt/airflow/project/scripts   (validate_data.py etc.)
#   ./data        → /opt/airflow/project/data      (read-only; raw DVC data)
#   ./pipelines   → /opt/airflow/project/pipelines
#   ./global_descriptors → /opt/airflow/project/global_descriptors
#   ./preprocesses       → /opt/airflow/project/preprocesses
#
# Required .env variables (copy .env.example → .env and fill in):
#   AIRFLOW_UID
#   FERNET_KEY          (generate: python -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())")
#   AIRFLOW__API_AUTH__JWT_SECRET
#   _AIRFLOW_WWW_USER_USERNAME   (default: airflow)
#   _AIRFLOW_WWW_USER_PASSWORD   (default: airflow)
#
# Start:
#   echo -e "AIRFLOW_UID=$(id -u)" >> .env
#   docker compose up airflow-init
#   docker compose up -d
# ─────────────────────────────────────────────────────────────────────────────
---
x-airflow-common:
  &airflow-common
  image: ${AIRFLOW_IMAGE_NAME:-apache/airflow:3.2.0}
  env_file:
    - ${ENV_FILE_PATH:-.env}
  environment:
    &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: CeleryExecutor
    AIRFLOW__CORE__AUTH_MANAGER: airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CELERY__RESULT_BACKEND: db+postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CELERY__BROKER_URL: redis://:@redis:6379/0
    AIRFLOW__CORE__FERNET_KEY: ${FERNET_KEY}
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__CORE__EXECUTION_API_SERVER_URL: 'http://airflow-apiserver:8080/execution/'
    AIRFLOW__API_AUTH__JWT_SECRET: ${AIRFLOW__API_AUTH__JWT_SECRET:-airflow_jwt_secret}
    AIRFLOW__API_AUTH__JWT_ISSUER: ${AIRFLOW__API_AUTH__JWT_ISSUER:-airflow}
    AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: 'true'
    AIRFLOW_CONFIG: '/opt/airflow/config/airflow.cfg'
    # ── Project-specific env vars ──────────────────────────────────────────
    # Makes the project source importable inside every Airflow container.
    PYTHONPATH: '/opt/airflow/project'
    # Points scripts/data.py to the mounted data directory.
    DEFAULT_DATASET_DIR: '/opt/airflow/project/data'
    # MLflow tracking URI so DAG tasks log experiments automatically.
    MLFLOW_TRACKING_URI: 'http://mlflow:5000'
    _PIP_ADDITIONAL_REQUIREMENTS: ${_PIP_ADDITIONAL_REQUIREMENTS:-}
  volumes:
    # ── Airflow standard dirs ──────────────────────────────────────────────
    - ${AIRFLOW_PROJ_DIR:-.}/dags:/opt/airflow/dags
    - ${AIRFLOW_PROJ_DIR:-.}/logs:/opt/airflow/logs
    - ${AIRFLOW_PROJ_DIR:-.}/config:/opt/airflow/config
    - ${AIRFLOW_PROJ_DIR:-.}/plugins:/opt/airflow/plugins
    # ── Project source tree (read-write so scripts can write processed data)
    - ${AIRFLOW_PROJ_DIR:-.}/scripts:/opt/airflow/project/scripts
    - ${AIRFLOW_PROJ_DIR:-.}/pipelines:/opt/airflow/project/pipelines
    - ${AIRFLOW_PROJ_DIR:-.}/global_descriptors:/opt/airflow/project/global_descriptors
    - ${AIRFLOW_PROJ_DIR:-.}/preprocesses:/opt/airflow/project/preprocesses
    - ${AIRFLOW_PROJ_DIR:-.}/postprocesses:/opt/airflow/project/postprocesses
    # ── Data (read-only for safety; only scripts write to data/processed/)
    - ${AIRFLOW_PROJ_DIR:-.}/data:/opt/airflow/project/data
    # ── MLflow artifact store shared between host and containers ──────────
    - mlflow-artifacts:/opt/mlflow/artifacts
  user: "${AIRFLOW_UID:-50000}:0"
  depends_on:
    &airflow-common-depends-on
    redis:
      condition: service_healthy
    postgres:
      condition: service_healthy

services:

  # ── Infrastructure ────────────────────────────────────────────────────────

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres-db-volume:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5
      start_period: 5s
    restart: always

  redis:
    image: redis:7.2-bookworm
    expose:
      - 6379
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 30s
      retries: 50
      start_period: 30s
    restart: always

  # ── MLflow tracking server ─────────────────────────────────────────────────
  # Accessible at http://localhost:5000
  # Artifacts stored in the shared named volume mlflow-artifacts.
  # The Airflow containers write to this server via MLFLOW_TRACKING_URI env var.
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.13.0
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri sqlite:////opt/mlflow/mlflow.db
      --serve-artifacts
      --artifacts-destination /opt/mlflow/artifacts
    ports:
      - "5000:5000"
    volumes:
      - mlflow-artifacts:/opt/mlflow/artifacts
      - mlflow-db:/opt/mlflow
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    restart: always

  # ── Airflow components ─────────────────────────────────────────────────────

  airflow-apiserver:
    <<: *airflow-common
    command: api-server
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/api/v2/monitor/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8974/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  airflow-dag-processor:
    <<: *airflow-common
    command: dag-processor
    healthcheck:
      test: ["CMD-SHELL", 'airflow jobs check --job-type DagProcessorJob --hostname "$${HOSTNAME}"']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  airflow-worker:
    <<: *airflow-common
    command: celery worker
    healthcheck:
      test: ["CMD-SHELL", 'celery --app airflow.providers.celery.executors.celery_executor.app inspect ping -d "celery@$${HOSTNAME}" || celery --app airflow.executors.celery_executor.app inspect ping -d "celery@$${HOSTNAME}"']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    environment:
      <<: *airflow-common-env
      DUMB_INIT_SETSID: "0"
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-apiserver:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully

  airflow-triggerer:
    <<: *airflow-common
    command: triggerer
    healthcheck:
      test: ["CMD-SHELL", 'airflow jobs check --job-type TriggererJob --hostname "$${HOSTNAME}"']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        if [[ -z "${AIRFLOW_UID}" ]]; then
          echo
          echo -e "\033[1;33mWARNING!!!: AIRFLOW_UID not set!\e[0m"
          echo "Add AIRFLOW_UID=$(id -u) to your .env file."
          echo
          export AIRFLOW_UID=$$(id -u)
        fi
        one_meg=1048576
        mem_available=$$(($$(getconf _PHYS_PAGES) * $$(getconf PAGE_SIZE) / one_meg))
        cpus_available=$$(grep -cE 'cpu[0-9]+' /proc/stat)
        disk_available=$$(df / | tail -1 | awk '{print $$4}')
        warning_resources="false"
        if (( mem_available < 4000 )) ; then
          echo -e "\033[1;33mWARNING!!!: Not enough memory (need 4 GB, have $$(numfmt --to iec $$((mem_available * one_meg))))\e[0m"
          warning_resources="true"
        fi
        if (( cpus_available < 2 )); then
          echo -e "\033[1;33mWARNING!!!: Not enough CPUs (need 2, have $${cpus_available})\e[0m"
          warning_resources="true"
        fi
        if (( disk_available < one_meg * 10 )); then
          echo -e "\033[1;33mWARNING!!!: Not enough disk (need 10 GB, have $$(numfmt --to iec $$((disk_available * 1024))))\e[0m"
          warning_resources="true"
        fi
        mkdir -v -p /opt/airflow/{logs,dags,plugins,config}
        /entrypoint airflow version
        /entrypoint airflow config list >/dev/null
        chown -R "${AIRFLOW_UID}:0" /opt/airflow/
        chown -v -R "${AIRFLOW_UID}:0" /opt/airflow/{logs,dags,plugins,config}
    environment:
      <<: *airflow-common-env
      _AIRFLOW_DB_MIGRATE: 'true'
      _AIRFLOW_WWW_USER_CREATE: 'true'
      _AIRFLOW_WWW_USER_USERNAME: ${_AIRFLOW_WWW_USER_USERNAME:-airflow}
      _AIRFLOW_WWW_USER_PASSWORD: ${_AIRFLOW_WWW_USER_PASSWORD:-airflow}
      _PIP_ADDITIONAL_REQUIREMENTS: ''
    user: "0:0"

  airflow-cli:
    <<: *airflow-common
    profiles:
      - debug
    environment:
      <<: *airflow-common-env
      CONNECTION_CHECK_MAX_COUNT: "0"
    command:
      - bash
      - -c
      - airflow
    depends_on:
      <<: *airflow-common-depends-on

  flower:
    <<: *airflow-common
    command: celery flower
    profiles:
      - flower
    ports:
      - "5555:5555"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:5555/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

volumes:
  postgres-db-volume:
  mlflow-artifacts:
  mlflow-db: