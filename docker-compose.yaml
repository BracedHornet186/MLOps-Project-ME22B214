# docker-compose.yaml
---
x-airflow-common:
  &airflow-common
  build:
    context: .
    dockerfile: airflow/Dockerfile
  env_file:
    - ${ENV_FILE_PATH:-.env}
  environment:
    &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW_CONN_FS_DEFAULT: 'fs://'
    AIRFLOW__CORE__AUTH_MANAGER: airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CELERY__RESULT_BACKEND: db+postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__FERNET_KEY: ${FERNET_KEY}
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__CORE__EXECUTION_API_SERVER_URL: 'http://airflow-apiserver:8080/execution/'
    AIRFLOW__API_AUTH__JWT_SECRET: ${AIRFLOW__API_AUTH__JWT_SECRET:-airflow_jwt_secret}
    AIRFLOW__API_AUTH__JWT_ISSUER: ${AIRFLOW__API_AUTH__JWT_ISSUER:-airflow}
    AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: 'true'
    # ── SMTP config for EmailOperator ──
    AIRFLOW_CONN_SMTP_DEFAULT: 'smtp://${SMTP_USER}:${SMTP_PASSWORD}@smtp.gmail.com:587?disable_ssl=true'
    AIRFLOW__SMTP__SMTP_HOST: 'smtp.gmail.com'
    AIRFLOW__SMTP__SMTP_STARTTLS: 'True'
    AIRFLOW__SMTP__SMTP_SSL: 'False'
    AIRFLOW__SMTP__SMTP_PORT: '587'
    AIRFLOW__SMTP__SMTP_MAIL_FROM: ${SMTP_MAIL_FROM:-mlops-team@example.com}
    AIRFLOW__SMTP__SMTP_USER: ${SMTP_USER:-}
    AIRFLOW__SMTP__SMTP_PASSWORD: ${SMTP_PASSWORD:-}
    AIRFLOW__SMTP__SMTP_TIMEOUT: '30'
    AIRFLOW__SMTP__SMTP_RETRY_LIMIT: '2'
    PYTHONPATH: '/opt/airflow/project'
    DEFAULT_DATASET_DIR: '/opt/airflow/project/data'
    MLFLOW_TRACKING_URI: 'http://mlflow:5000'
    HOST_PROJECT_ROOT: ${HOST_PROJECT_ROOT:-/home/abhiyaan-cu/Yash/MLOps-Project-ME22B214}
    _PIP_ADDITIONAL_REQUIREMENTS: ${_PIP_ADDITIONAL_REQUIREMENTS:-}
  volumes:
    - ${AIRFLOW_PROJ_DIR:-./airflow}/dags:/opt/airflow/dags
    - ${AIRFLOW_PROJ_DIR:-./airflow}/logs:/opt/airflow/logs
    - ${AIRFLOW_PROJ_DIR:-./airflow}/plugins:/opt/airflow/plugins
    - ${AIRFLOW_PROJ_DIR:-./airflow}/config:/opt/airflow/config
    - ./conf:/opt/airflow/project/conf
    - ./scripts:/opt/airflow/project/scripts
    - ./pipelines:/opt/airflow/project/pipelines
    - ./global_descriptors:/opt/airflow/project/global_descriptors
    - ./preprocesses:/opt/airflow/project/preprocesses
    - ./postprocesses:/opt/airflow/project/postprocesses
    - ./features:/opt/airflow/project/features
    - ./models:/opt/airflow/project/models
    - ./matchers:/opt/airflow/project/matchers
    - ./clusterings:/opt/airflow/project/clusterings
    - ./retrievers:/opt/airflow/project/retrievers
    - ./shortlists:/opt/airflow/project/shortlists
    - ./localizers:/opt/airflow/project/localizers
    - ./utils:/opt/airflow/project/utils
    - ./data:/opt/airflow/project/data
    - mlflow-artifacts:/opt/mlflow/artifacts
    # Docker-out-of-Docker: lets DockerOperator spawn sibling containers
    - /var/run/docker.sock:/var/run/docker.sock
  user: "${AIRFLOW_UID:-1000}:0"
  # Allow the Airflow process to write to the Docker socket (gid must match host docker group)
  group_add:
    - "${DOCKER_GID:-984}"
  depends_on:
    &airflow-common-depends-on
    postgres:
      condition: service_healthy

services:

  # ── Infrastructure ──────────────────────────────────────────────────────────

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres-db-volume:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5
      start_period: 5s
    restart: always

  node-exporter:
    image: prom/node-exporter:v1.8.1
    ports:
      - "9100:9100"
    restart: always

  # ── MLflow tracking server ──────────────────────────────────────────────────

  mlflow:
    image: ghcr.io/mlflow/mlflow:v3.10.1
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri sqlite:////opt/mlflow/mlflow.db
      --default-artifact-root mlflow-artifacts:/
      --artifacts-destination /opt/mlflow/artifacts
      --serve-artifacts
      --allowed-hosts "mlflow,mlflow:5000,localhost,localhost:5000,airflow,airflow:8080"
    ports:
      - "5000:5000"
    volumes:
      - mlflow-artifacts:/opt/mlflow/artifacts
      - mlflow-db:/opt/mlflow
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    restart: always

  # ── Ray Serve (unified GPU + API gateway) ───────────────────────────────────
  ray-serve:
    image: mlops-project-me22b214-ray-serve:latest
    build:
      context: .
      dockerfile: api/Dockerfile
    ports:
      - "8000:8000"
      - "8265:8265"
    shm_size: '16gb'
    environment:
      PYTHONUNBUFFERED: 1
      RAY_DASHBOARD_HOST: "0.0.0.0"
      RAY_GRAFANA_HOST: "http://localhost:3001"
      RAY_PROMETHEUS_HOST: "http://prometheus:9090"
      MLFLOW_TRACKING_URI: "http://mlflow:5000"
      DEFAULT_DATASET_DIR: "/app/data"
      PIPELINE_CONFIG: "/app/conf/best_config.yaml"
      PIPELINE_CONFIG_FALLBACK: "/app/conf/mast3r.yaml"
      RESULTS_DIR: "/app/results"
      CUDA_VISIBLE_DEVICES: "0"
      SCENE3D_MAX_UPLOAD_MB: "500"
      SCENE3D_VOXEL_SIZE: "0.02"
      SCENE3D_MAX_POINTS: "500000"
      AUTH_ENABLED: "true"
      AIRFLOW_API_URL: "http://airflow-apiserver:8080"
    command: bash -c "ray start --head --dashboard-host=0.0.0.0 && serve run serve_app:api_node"
    secrets:
      - jwt_secret
    volumes:
      - ./data:/app/data:ro
      - ./conf:/app/conf:ro
      - ./extra:/app/extra:ro
      - reconstruction-results:/app/results
      - mlflow-artifacts:/opt/mlflow/artifacts
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8000/ready"]
      interval: 60s
      timeout: 10s
      retries: 5
      start_period: 300s
    restart: on-failure
    profiles:
      - inference
    networks:
      - default

  # ── React + Three.js Frontend ───────────────────────────────────────────────

  scene3d-ui:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
    container_name: scene3d-ui
    ports:
      - "443:443"
      - "5173:80"
    volumes:
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      ray-serve:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 20
      start_period: 10s
    restart: on-failure
    profiles:
      - inference

  # ── Airflow components ──────────────────────────────────────────────────────

  airflow-apiserver:
    <<: *airflow-common
    command: api-server
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/api/v2/monitor/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8974/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  airflow-dag-processor:
    <<: *airflow-common
    command: dag-processor
    healthcheck:
      test: ["CMD-SHELL", 'airflow jobs check --job-type DagProcessorJob --hostname "$${HOSTNAME}"']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  # airflow-worker:
  #   <<: *airflow-common
  #   command: celery worker
  #   healthcheck:
  #     test: ["CMD-SHELL", 'celery --app airflow.providers.celery.executors.celery_executor.app inspect ping -d "celery@$${HOSTNAME}" || celery --app airflow.executors.celery_executor.app inspect ping -d "celery@$${HOSTNAME}"']
  #     interval: 30s
  #     timeout: 10s
  #     retries: 5
  #     start_period: 30s
  #   environment:
  #     <<: *airflow-common-env
  #     DUMB_INIT_SETSID: "0"
  #   restart: always
  #   depends_on:
  #     <<: *airflow-common-depends-on
  #     airflow-apiserver:
  #       condition: service_healthy
  #     airflow-init:
  #       condition: service_completed_successfully

  airflow-triggerer:
    <<: *airflow-common
    command: triggerer
    healthcheck:
      test: ["CMD-SHELL", 'airflow jobs check --job-type TriggererJob --hostname "$${HOSTNAME}"']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        if [[ -z "${AIRFLOW_UID}" ]]; then
          echo -e "\033[1;33mWARNING: AIRFLOW_UID not set. Add AIRFLOW_UID=$(id -u) to .env\e[0m"
          export AIRFLOW_UID=$$(id -u)
        fi
        one_meg=1048576
        mem_available=$$(($$(getconf _PHYS_PAGES) * $$(getconf PAGE_SIZE) / one_meg))
        cpus_available=$$(grep -cE 'cpu[0-9]+' /proc/stat)
        disk_available=$$(df / | tail -1 | awk '{print $$4}')
        if (( mem_available < 4000 ));        then echo -e "\033[1;33mWARNING: <4 GB RAM\e[0m"; fi
        if (( cpus_available < 2 ));          then echo -e "\033[1;33mWARNING: <2 CPUs\e[0m"; fi
        if (( disk_available < one_meg*10 )); then echo -e "\033[1;33mWARNING: <10 GB disk\e[0m"; fi
        mkdir -v -p /opt/airflow/{logs,dags,plugins,config}
        /entrypoint airflow version
        /entrypoint airflow config list >/dev/null
        chown -R "${AIRFLOW_UID}:0" /opt/airflow/
        chown -v -R "${AIRFLOW_UID}:0" /opt/airflow/{logs,dags,plugins,config}
    environment:
      <<: *airflow-common-env
      _AIRFLOW_DB_MIGRATE: 'true'
      _AIRFLOW_WWW_USER_CREATE: 'true'
      _AIRFLOW_WWW_USER_USERNAME: ${_AIRFLOW_WWW_USER_USERNAME:-airflow}
      _AIRFLOW_WWW_USER_PASSWORD: ${_AIRFLOW_WWW_USER_PASSWORD:-airflow}
      _PIP_ADDITIONAL_REQUIREMENTS: ${_PIP_ADDITIONAL_REQUIREMENTS:-}
    user: "0:0"

  airflow-cli:
    <<: *airflow-common
    profiles:
      - debug
    environment:
      <<: *airflow-common-env
      CONNECTION_CHECK_MAX_COUNT: "0"
    command:
      - bash
      - -c
      - airflow
    depends_on:
      <<: *airflow-common-depends-on

  # ── Monitoring ──────────────────────────────────────────────────────────────

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=30d'
    healthcheck:
      test: ["CMD", "wget", "-q", "--tries=1", "-O-", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: always

  alertmanager:
    image: prom/alertmanager:v0.27.0
    ports:
      - "9093:9093"
    volumes:
      - ./monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--tries=1", "-O-", "http://localhost:9093/-/healthy"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: always

  grafana:
    image: grafana/grafana:11.1.0
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD__FILE: /run/secrets/grafana_admin_password
      GF_SECURITY_ALLOW_EMBEDDING: "true"
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/scene_reconstruction.json
    secrets:
      - grafana_admin_password
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: always

secrets:
  jwt_secret:
    file: ./secrets/jwt_secret
  grafana_admin_password:
    file: ./secrets/grafana_admin_password

volumes:
  postgres-db-volume:
  mlflow-artifacts:
  mlflow-db:
  reconstruction-results:
  prometheus-data:
  grafana-data:

# Pin the default Compose network to a known name so DockerOperator
# containers can resolve service hostnames (e.g. mlflow:5000).
networks:
  default:
    name: mlops_net