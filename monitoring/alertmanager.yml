# monitoring/alertmanager.yml
# ─────────────────────────────────────────────────────────────────────────────
# Alertmanager config for Scene Reconstruction MLOps.
#
# Routes drift and performance alerts to a webhook that triggers
# the Airflow drift_retrain_pipeline DAG.
# ─────────────────────────────────────────────────────────────────────────────

global:
  smtp_smarthost: 'sandbox.smtp.mailtrap.io:2525'
  smtp_from: 'mlops-me22b214@alerts.com'
  smtp_auth_username: 'api'
  smtp_auth_password: '<API-KEY>'
  smtp_require_tls: true

route:
  group_by: ['alertname']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: 'email_only'
  routes:
    # Route drift/performance alerts to the Airflow webhook trigger AND send an email
    - match_re:
        alertname: 'FeatureDriftDetected|InputBrightnessDrift|InputContrastDrift|PerformanceDecay'
      receiver: 'airflow_webhook_and_email'
      group_wait: 1m
      repeat_interval: 6h

receivers:
  # 1. Receiver for standard alerts (sends email only)
  - name: 'email_only'
    email_configs:
      - to: 'admin@example.com'
        send_resolved: true

  # 2. Receiver for drift alerts (triggers Airflow AND sends an email)
  - name: 'airflow_webhook_and_email'
    webhook_configs:
      - url: 'http://airflow-apiserver:8080/api/v2/dags/experiment_pipeline_dag/dagRuns'
        send_resolved: false
        http_config:
          basic_auth:
            username: 'airflow'
            password: 'airflow'
    email_configs:
      - to: 'admin@example.com'
        send_resolved: true

inhibit_rules:
  # If ModelServerDown is firing, suppress drift alerts (they're unreliable)
  - source_match:
      alertname: 'ModelServerDown'
    target_match_re:
      alertname: 'FeatureDriftDetected|InputBrightnessDrift|InputContrastDrift|PerformanceDecay'
