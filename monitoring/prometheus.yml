# monitoring/prometheus.yml
# ─────────────────────────────────────────────────────────────────────────────
# Prometheus scrape configuration for Scene Reconstruction MLOps stack.
# ─────────────────────────────────────────────────────────────────────────────

global:
  scrape_interval: 15s
  evaluation_interval: 15s

# ── Alert rules ──────────────────────────────────────────────────────────────

rule_files:
  - /etc/prometheus/alert_rules.yml

# ── Scrape targets ───────────────────────────────────────────────────────────

scrape_configs:

  # Prometheus self-monitoring
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # FastAPI gateway — /metrics endpoint (Prometheus client)
  - job_name: "scene_api"
    metrics_path: /metrics
    scrape_interval: 10s
    static_configs:
      - targets: ["api:8000"]
    # Only scrape when inference profile is up
    honor_labels: true

  # MLflow tracking server
  - job_name: "mlflow"
    metrics_path: /health
    scrape_interval: 30s
    static_configs:
      - targets: ["mlflow:5000"]

# ── Alerting rules (inline) ─────────────────────────────────────────────────
# These are referenced via rule_files above.  We create the alert file below.
